name: Cadence
options:
  bundleIdPrefix: com.dineshd
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    DEVELOPMENT_TEAM: WWDLQL8W8W
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    exactVersion: "2.43.0"
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    from: "2.1.0"

targets:
  Cadence:
    type: application
    platform: iOS
    sources:
      - path: Cadence/Sources
    resources:
      - path: Cadence/Resources
    entitlements:
      path: Cadence/Cadence.entitlements
    dependencies:
      - package: Supabase
      - package: PhosphorSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dineshd.cadence
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Cadence/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

  CadenceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CadenceTests
    dependencies:
      - target: Cadence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dineshd.cadence.tests
        GENERATE_INFOPLIST_FILE: "YES"

  CadenceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CadenceUITests
    dependencies:
      - target: Cadence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dineshd.cadence.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Cadence
