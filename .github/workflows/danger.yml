name: Danger
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  danger:
    name: PR Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR checks
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const warnings = [];
            const messages = [];

            // Title format check
            const titleRegex = /^(feat|fix|refactor|test|chore|docs|exp)\(.+\): .+/;
            if (!titleRegex.test(pr.title)) {
              warnings.push('PR title should follow Conventional Commits: `type(scope): description`');
            }

            // Body check
            if (!pr.body || pr.body.trim().length < 20) {
              warnings.push('PR description is missing or too short. Add a summary and test plan.');
            }

            // Size warning
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const totalChanges = files.data.reduce((sum, f) => sum + f.changes, 0);
            if (totalChanges > 500) {
              warnings.push(`Large PR (${totalChanges} lines changed). Consider splitting.`);
            }

            // Sensitive file checks
            const sensitivePatterns = [/EncryptionService/, /CadenceCrypto/, /\.xcconfig$/, /migrations\//];
            const touchedSensitive = files.data
              .filter(f => sensitivePatterns.some(p => p.test(f.filename)))
              .map(f => f.filename);
            if (touchedSensitive.length > 0) {
              messages.push(`Sensitive files modified: ${touchedSensitive.map(f => '`' + f + '`').join(', ')}`);
            }

            // Build comment
            let body = '## PR Review\n\n';
            if (warnings.length === 0 && messages.length === 0) {
              body += 'All checks passed.\n';
            }
            if (warnings.length > 0) {
              body += '### Warnings\n' + warnings.map(w => `- ${w}`).join('\n') + '\n\n';
            }
            if (messages.length > 0) {
              body += '### Notes\n' + messages.map(m => `- ${m}`).join('\n') + '\n';
            }

            // Post or update comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## PR Review')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
