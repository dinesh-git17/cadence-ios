name: PR Summary
on:
  workflow_run:
    workflows: [Lint]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: read

jobs:
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Find the PR associated with this workflow run
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`
            });
            if (prs.data.length === 0) return;
            const pr = prs.data[0];

            // Get all check runs for this commit
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100
            });

            // Map workflow names to friendly display
            const ciChecks = [
              { name: 'Xcode Build', pattern: /Xcode Build/ },
              { name: 'Unit Tests', pattern: /Unit Tests/ },
              { name: 'SwiftLint', pattern: /SwiftLint/ },
              { name: 'Migration Lint', pattern: /Migration Lint/ },
              { name: 'Auto Label', pattern: /Auto Label/ },
              { name: 'Size Label', pattern: /Size Label/ },
            ];

            const statusIcon = (status, conclusion) => {
              if (status !== 'completed') return '\u23f3 Running';
              switch (conclusion) {
                case 'success': return '\u2705 Passed';
                case 'failure': return '\u274c Failed';
                case 'skipped': return '\u23ed Skipped';
                case 'cancelled': return '\u26d4 Cancelled';
                default: return '\u2754 Unknown';
              }
            };

            let rows = [];
            for (const ci of ciChecks) {
              const match = checks.data.check_runs.find(c => ci.pattern.test(c.name));
              if (match) {
                const status = statusIcon(match.status, match.conclusion);
                const comment = match.conclusion === 'failure' ? `[See logs](${match.html_url})` : '';
                rows.push(`| ${ci.name} | ${status} | ${comment} |`);
              } else {
                rows.push(`| ${ci.name} | \u23f3 Pending | |`);
              }
            }

            // PR metadata checks
            const warnings = [];
            const titleRegex = /^(feat|fix|refactor|test|chore|docs|exp)\(.+\): .+/;
            if (!titleRegex.test(pr.title)) {
              warnings.push('PR title should follow Conventional Commits: `type(scope): description`');
            }
            if (!pr.body || pr.body.trim().length < 20) {
              warnings.push('PR description is missing or too short.');
            }

            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const totalChanges = files.data.reduce((sum, f) => sum + f.changes, 0);
            if (totalChanges > 500) {
              warnings.push(`Large PR (${totalChanges} lines changed). Consider splitting.`);
            }

            const sensitivePatterns = [/EncryptionService/, /CadenceCrypto/, /\.xcconfig$/, /migrations\//];
            const touchedSensitive = files.data
              .filter(f => sensitivePatterns.some(p => p.test(f.filename)))
              .map(f => f.filename);

            // Build comment
            let body = '## PR Summary\n\n';
            body += '| CI Check | Status | Comments |\n';
            body += '|---|---|---|\n';
            body += rows.join('\n') + '\n';

            if (warnings.length > 0) {
              body += '\n### Warnings\n' + warnings.map(w => `- ${w}`).join('\n') + '\n';
            }
            if (touchedSensitive.length > 0) {
              body += '\n### Sensitive Files\n' + touchedSensitive.map(f => `- \`${f}\``).join('\n') + '\n';
            }

            // Post or update comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## PR Summary')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
