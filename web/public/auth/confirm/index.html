<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email confirmed — Cadence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .confirm-wrapper {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        z-index: 1;
      }
      .confirm-card {
        background: var(--bg-warm);
        border: 0.5px solid var(--border-default);
        border-radius: 16px;
        padding: 48px 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .confirm-icon {
        width: 56px;
        height: 56px;
        background: var(--primary-faint);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .confirm-icon svg {
        color: var(--primary);
      }
      .confirm-card h1 {
        font-family: var(--font-serif);
        font-size: 24px;
        font-weight: 400;
        color: var(--text-primary);
        margin-bottom: 8px;
      }
      .confirm-card p {
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-secondary);
        margin-bottom: 32px;
      }
      .confirm-footer {
        font-family: var(--font-sans);
        font-size: 11px;
        color: var(--text-tertiary);
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <div class="confirm-wrapper">
      <div class="wordmark" style="margin-bottom: 48px;">Cadence<span class="dot">.</span></div>
      <div class="confirm-card">
        <div class="confirm-icon">
          <svg width="28" height="28" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M173.66,98.34a8,8,0,0,1,0,11.32l-56,56a8,8,0,0,1-11.32,0l-24-24a8,8,0,0,1,11.32-11.32L112,148.69l50.34-50.35A8,8,0,0,1,173.66,98.34ZM232,128A104,104,0,1,1,128,24,104.11,104.11,0,0,1,232,128Zm-16,0a88,88,0,1,0-88,88A88.1,88.1,0,0,0,216,128Z" fill="currentColor"/>
          </svg>
        </div>
        <h1>Email confirmed</h1>
        <p>Your account is ready. Open Cadence to sign in.</p>
        <a href="/" class="btn-primary">Back to Cadence</a>
      </div>
      <p class="confirm-footer">Cycle tracking, together.</p>
    </div>
  </body>
</html>
