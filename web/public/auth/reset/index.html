<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — Cadence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .reset-wrapper {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        z-index: 1;
      }
      .reset-card {
        background: var(--bg-warm);
        border: 0.5px solid var(--border-default);
        border-radius: 16px;
        padding: 48px 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .reset-icon {
        width: 56px;
        height: 56px;
        background: var(--primary-faint);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .reset-icon svg {
        color: var(--primary);
      }
      .reset-card h1 {
        font-family: var(--font-serif);
        font-size: 24px;
        font-weight: 400;
        color: var(--text-primary);
        margin-bottom: 8px;
      }
      .reset-card p {
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-secondary);
        margin-bottom: 32px;
      }
      .reset-footer {
        font-family: var(--font-sans);
        font-size: 11px;
        color: var(--text-tertiary);
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <div class="reset-wrapper">
      <div class="wordmark" style="margin-bottom: 48px;">Cadence<span class="dot">.</span></div>
      <div class="reset-card">
        <div class="reset-icon">
          <svg width="28" height="28" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm40-88a40,40,0,1,1-40-40A40,40,0,0,1,168,128Zm-56,0a16,16,0,1,0,16-16A16,16,0,0,0,112,128Z" fill="currentColor"/>
          </svg>
        </div>
        <h1>Reset your password</h1>
        <p>Open Cadence on your device to set a new password.</p>
        <a href="/" class="btn-primary">Back to Cadence</a>
      </div>
      <p class="reset-footer">Cycle tracking, together.</p>
    </div>
  </body>
</html>
